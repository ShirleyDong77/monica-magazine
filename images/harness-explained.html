<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    background: #0D0D0D; 
    color: #F5F5F0; 
    font-family: 'Georgia', serif;
    padding: 48px;
  }
  .title {
    font-size: 28px;
    letter-spacing: 0.15em;
    text-align: center;
    margin-bottom: 8px;
    color: #C9A84C;
  }
  .subtitle {
    text-align: center;
    font-size: 13px;
    color: #888;
    letter-spacing: 0.1em;
    margin-bottom: 48px;
  }
  .diagram {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin-bottom: 48px;
  }
  .section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 24px;
  }
  .section-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 20px;
  }
  .horse {
    width: 200px;
    height: 160px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .horse-icon {
    font-size: 72px;
    opacity: 0.6;
  }
  .chaos-lines {
    position: absolute;
    width: 220px;
    height: 160px;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    border: 1px dashed #333;
    border-radius: 50%;
  }
  .chaos-label {
    font-size: 11px;
    color: #FF6B6B;
    margin-top: 12px;
    text-align: center;
    line-height: 1.6;
  }
  .arrow {
    font-size: 36px;
    color: #C9A84C;
    padding: 0 16px;
    flex-shrink: 0;
  }
  .harness-system {
    width: 220px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .harness-icon {
    font-size: 72px;
  }
  .harness-gears {
    display: flex;
    gap: 12px;
    margin-top: 16px;
  }
  .gear {
    width: 44px;
    height: 44px;
    border: 2px solid #C9A84C;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #C9A84C;
    letter-spacing: 0;
  }
  .harness-label {
    margin-top: 12px;
    font-size: 11px;
    color: #888;
    text-align: center;
    line-height: 1.6;
  }
  .output {
    width: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .output-icon {
    font-size: 72px;
    color: #C9A84C;
    opacity: 0.9;
  }
  .output-label {
    font-size: 11px;
    color: #4CAF50;
    margin-top: 12px;
    text-align: center;
    line-height: 1.6;
  }
  .legend {
    border-top: 1px solid #222;
    padding-top: 32px;
    max-width: 800px;
    margin: 0 auto;
  }
  .legend-title {
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #C9A84C;
    margin-bottom: 24px;
    text-align: center;
  }
  .legend-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
  }
  .legend-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 16px;
    border: 1px solid #222;
  }
  .legend-icon {
    font-size: 28px;
    margin-bottom: 10px;
  }
  .legend-name {
    font-size: 13px;
    font-weight: bold;
    color: #F5F5F0;
    margin-bottom: 6px;
  }
  .legend-desc {
    font-size: 11px;
    color: #888;
    line-height: 1.5;
  }
  .core-message {
    text-align: center;
    margin-top: 40px;
    padding: 24px;
    border: 1px solid #C9A84C;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
  }
  .core-message p {
    font-size: 15px;
    line-height: 1.8;
    color: #F5F5F0;
  }
  .core-message strong {
    color: #C9A84C;
  }
</style>
</head>
<body>

<div class="title">HARNESS ENGINEERING</div>
<div class="subtitle">驾驭工程 · AI 时代的工程范式革命</div>

<div class="diagram">
  <!-- LEFT: Wild Horse -->
  <div class="section">
    <div class="section-label">LLM 能力</div>
    <div class="horse">
      <div class="horse-icon">🐎</div>
      <div class="chaos-lines"></div>
    </div>
    <div class="chaos-label">强但无方向<br>快但容易跑偏</div>
  </div>

  <!-- ARROW -->
  <div class="arrow">→</div>

  <!-- CENTER: Harness -->
  <div class="section">
    <div class="section-label">Harness 系统</div>
    <div class="harness-system">
      <div class="harness-icon">⚙️</div>
      <div class="harness-gears">
        <div class="gear">工具</div>
        <div class="gear">反馈</div>
        <div class="gear">验证</div>
      </div>
    </div>
    <div class="harness-label">约束 · 引导 · 验证<br>把蛮力变执行力</div>
  </div>

  <!-- ARROW -->
  <div class="arrow">→</div>

  <!-- RIGHT: Ordered Output -->
  <div class="section">
    <div class="section-label">可靠输出</div>
    <div class="output">
      <div class="output-icon">✅</div>
    </div>
    <div class="output-label">一致 · 可维护<br>可信赖</div>
  </div>
</div>

<!-- Legend -->
<div class="legend">
  <div class="legend-title">Harness 的四个支柱</div>
  <div class="legend-grid">
    <div class="legend-item">
      <div class="legend-icon">🔧</div>
      <div class="legend-name">工具设计</div>
      <div class="legend-desc">模型表达意图的接口<br>决定能否正确执行</div>
    </div>
    <div class="legend-item">
      <div class="legend-icon">🔄</div>
      <div class="legend-name">反馈回路</div>
      <div class="legend-desc">成功沉默<br>只有失败出声</div>
    </div>
    <div class="legend-item">
      <div class="legend-icon">🛡️</div>
      <div class="legend-name">验证机制</div>
      <div class="legend-desc">交卷前强制对照<br>任务规格检查</div>
    </div>
    <div class="legend-item">
      <div class="legend-icon">🔥</div>
      <div class="legend-name">熵管理</div>
      <div class="legend-desc">防止技术债<br>指数级累积</div>
    </div>
  </div>
</div>

<!-- Core Message -->
<div class="core-message">
  <p><strong>同一模型，不同 Harness，截然不同结果。</strong><br>
  Harness 不是让 AI 更强，是让 AI 的强变得可用。</p>
</div>

</body>
</html>
